<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos & SaaS — João Quintana</title>
  <meta name="description" content="Projetos e SaaS criados por João Quintana.">
  <meta property="og:title" content="Projetos & SaaS — João Quintana">
  <meta property="og:description" content="Tudo que estou construindo.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== CONTAINER ========== */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 20px 32px;
      margin: 0 auto;
    }

    /* ========== ANIMAÇÕES ========== */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      opacity: 0;
      animation: fadeSlideUp 0.5s ease-out forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-in {
        animation: none;
        opacity: 1;
      }
      .project-card {
        transition: none !important;
      }
    }

    /* ========== HEADER ========== */
    .page-header {
      margin-bottom: 32px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #a1a1aa;
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 24px;
      transition: color 0.3s ease;
      min-height: 44px;
    }

    .back-link:hover {
      color: #3b82f6;
    }

    .back-link:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
      border-radius: 4px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-header .subtitle {
      font-size: 14px;
      color: #a1a1aa;
      font-weight: 400;
    }

    /* ========== GRID DE PROJETOS ========== */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (min-width: 640px) {
      .container {
        max-width: 640px;
      }
      .projects-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 1024px) {
      .container {
        padding: 48px 24px 40px;
      }
    }

    /* ========== CARD DE PROJETO ========== */
    .project-card {
      display: block;
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: #ffffff;
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }

    .project-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.15);
      transform: scale(1.02);
    }

    .project-card:focus-visible {
      outline: 2px solid #3b82f6;
      outline-offset: 2px;
    }

    .project-card__emoji {
      font-size: 28px;
      margin-bottom: 16px;
      display: block;
    }

    .project-card__name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .project-card__desc {
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .project-card__badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 12px;
      line-height: 1;
    }

    .badge--active {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .badge--soon {
      background: rgba(234, 179, 8, 0.15);
      color: #eab308;
    }

    .badge--beta {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    /* ========== FOOTER ========== */
    footer {
      text-align: center;
      padding: 16px 20px 32px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header animate-in" style="animation-delay: 0.1s">
      <a href="index.html" class="back-link" aria-label="Voltar para página principal">← Voltar</a>
      <h1>Projetos & SaaS</h1>
      <p class="subtitle">Tudo que estou construindo.</p>
    </header>

    <main>
      <div class="projects-grid" id="cards-container"></div>
    </main>

    <script>
      const API = 'https://bqbijrcdbhgbdznlqdlu.supabase.co/functions/v1';
      const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxYmlqcmNkYmhnYmR6bmxxZGx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzU1NzgsImV4cCI6MjA5MTAxMTU3OH0.WVn_DcR7RcBZiwITo_JJpqdyQ5iKeBKomn65nzqC3Yg';

      const badgeMap = { active: 'badge--active', soon: 'badge--soon', beta: 'badge--beta' };
      const badgeLabel = { active: '🟢 Ativo', soon: '🟡 Em breve', beta: '🔵 Beta' };

      function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      (async () => {
        const container = document.getElementById('cards-container');
        try {
          const res = await fetch(`${API}/get-cards?page=projetos`, { headers: { 'Authorization': `Bearer ${KEY}` } });
          if (!res.ok) { container.innerHTML = '<p style="color:#a1a1aa;font-size:13px;text-align:center;padding:40px 0;">Erro ao carregar projetos.</p>'; return; }
          const cards = await res.json();
          container.innerHTML = cards.map((c, i) => `
            <a href="${escapeHtml(c.url) || '#'}" ${c.url && c.url !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''} class="project-card animate-in" style="animation-delay:${0.3 + i * 0.1}s">
              <span class="project-card__emoji">${escapeHtml(c.icon) || '📦'}</span>
              <h2 class="project-card__name">${escapeHtml(c.title)}</h2>
              <p class="project-card__desc">${escapeHtml(c.description)}</p>
              ${c.status ? `<span class="project-card__badge ${badgeMap[c.status] || ''}">${badgeLabel[c.status] || escapeHtml(c.status)}</span>` : ''}
            </a>
          `).join('');
        } catch {
          container.innerHTML = '<p style="color:#a1a1aa;font-size:13px;text-align:center;padding:40px 0;">Erro ao carregar projetos.</p>';
        }
      })();
    </script>

    <footer>
      <p>&copy; 2026 João Quintana. Feito com ☕ e código.</p>
    </footer>
  </div>
</body>
</html>
