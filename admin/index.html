<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Link in Bio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }

    /* LOGIN */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .login-box h1 { font-size: 20px; margin-bottom: 8px; }
    .login-box p { font-size: 13px; color: #a1a1aa; margin-bottom: 24px; }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .login-box input::placeholder { color: #555; }
    .login-box input:focus { outline: none; border-color: #3b82f6; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn--outline {
      background: transparent;
      border: 1px solid #1e1e1e;
      color: #a1a1aa;
    }

    .btn--outline:hover { border-color: #3b82f6; color: #fff; }

    .btn--danger { background: #ef4444; }
    .btn--danger:hover { background: #dc2626; }

    .btn--sm { padding: 8px 14px; font-size: 12px; width: auto; }

    .login-msg {
      margin-top: 12px;
      font-size: 12px;
      color: #ef4444;
      min-height: 18px;
    }

    /* DASHBOARD */
    .dashboard { display: none; max-width: 720px; margin: 0 auto; padding: 32px 20px; }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .dash-header h1 { font-size: 20px; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
    }

    .tab {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      color: #a1a1aa;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab:hover { border-color: #3b82f6; color: #fff; }
    .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }

    /* CARDS LIST */
    .cards-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .cards-toolbar span { font-size: 13px; color: #a1a1aa; }

    .card-item {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-item__icon { font-size: 22px; flex-shrink: 0; }

    .card-item__info { flex: 1; min-width: 0; }
    .card-item__info strong { font-size: 14px; display: block; margin-bottom: 2px; }
    .card-item__info small { font-size: 12px; color: #a1a1aa; }

    .card-item__actions { display: flex; gap: 6px; flex-shrink: 0; }

    .card-item--hidden { opacity: 0.4; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      margin-left: 8px;
    }

    .badge--active { background: rgba(34,197,94,.15); color: #22c55e; }
    .badge--soon { background: rgba(234,179,8,.15); color: #eab308; }
    .badge--beta { background: rgba(59,130,246,.15); color: #3b82f6; }
    .badge--gated { background: rgba(168,85,247,.15); color: #a855f7; }
    .badge--orange { background: rgba(249,115,22,.15); color: #f97316; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      max-width: 480px;
      width: 100%;
      padding: 32px 24px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 18px; margin-bottom: 20px; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: #a1a1aa; margin-bottom: 6px; }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 14px;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus { outline: none; border-color: #3b82f6; }
    .field textarea { resize: vertical; min-height: 60px; }
    .field select { cursor: pointer; }
    .field select option { background: #111; }

    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }

    .field-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field-check input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #3b82f6;
    }

    .field-check label { font-size: 13px; color: #a1a1aa; cursor: pointer; }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-actions .btn { flex: 1; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-wrapper" id="login-view">
    <div class="login-box">
      <h1>Admin</h1>
      <p>Faça login para gerenciar seu link in bio.</p>
      <form id="login-form">
        <input type="text" name="username" placeholder="Usuário" required autocomplete="username">
        <input type="password" name="password" placeholder="Senha" required autocomplete="current-password">
        <button type="submit" class="btn" id="login-btn">Entrar</button>
        <div class="login-msg" id="login-msg"></div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard-view">
    <div class="dash-header">
      <h1>Painel Admin</h1>
      <button class="btn btn--outline btn--sm" id="logout-btn">Sair</button>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-page="index">Index</button>
      <button class="tab" data-page="projetos">Projetos</button>
      <button class="tab" data-page="prompts">Prompts</button>
      <button class="tab" data-page="ferramentas">Ferramentas</button>
    </div>

    <div class="cards-toolbar">
      <span id="cards-count"></span>
      <button class="btn btn--sm" id="add-card-btn">+ Adicionar</button>
    </div>

    <div id="cards-list"></div>
  </div>

  <!-- MODAL EDITAR/CRIAR -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Novo Card</h2>
      <form id="card-form">
        <input type="hidden" name="id">
        <input type="hidden" name="page">

        <div class="field-row">
          <div class="field" style="flex: 0 0 80px;">
            <label>Ícone</label>
            <input type="text" name="icon" placeholder="🚀" maxlength="4">
          </div>
          <div class="field">
            <label>Título</label>
            <input type="text" name="title" required placeholder="Nome do card">
          </div>
        </div>

        <div class="field">
          <label>Descrição</label>
          <textarea name="description" placeholder="Breve descrição..."></textarea>
        </div>

        <div class="field">
          <label>URL</label>
          <input type="text" name="url" placeholder="https://...">
        </div>

        <div class="field-row">
          <div class="field">
            <label>Tipo de link</label>
            <select name="link_type">
              <option value="external">Externo</option>
              <option value="internal">Interno (página)</option>
              <option value="gated">Gated (requer cadastro)</option>
            </select>
          </div>
          <div class="field" id="field-gate-source">
            <label>Gate source</label>
            <select name="gate_source">
              <option value="">--</option>
              <option value="prompts">prompts</option>
              <option value="ferramentas">ferramentas</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div class="field" id="field-status">
            <label>Status (projetos)</label>
            <select name="status">
              <option value="">--</option>
              <option value="active">Ativo</option>
              <option value="soon">Em breve</option>
              <option value="beta">Beta</option>
            </select>
          </div>
          <div class="field">
            <label>Destaque</label>
            <select name="highlight">
              <option value="">Nenhum</option>
              <option value="orange">Laranja</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Ordem</label>
          <input type="number" name="sort_order" value="0" min="0">
        </div>

        <div class="field-check">
          <input type="checkbox" name="visible" id="cb-visible" checked>
          <label for="cb-visible">Visível</label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn--outline" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn" id="modal-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://bqbijrcdbhgbdznlqdlu.supabase.co/functions/v1';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxYmlqcmNkYmhnYmR6bmxxZGx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzU1NzgsImV4cCI6MjA5MTAxMTU3OH0.WVn_DcR7RcBZiwITo_JJpqdyQ5iKeBKomn65nzqC3Yg';

    let currentPage = 'index';
    let cards = [];

    const _escMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, c => _escMap[c]);
    }

    // ========== AUTH ==========
    function getToken() { return localStorage.getItem('admin_token'); }
    function setToken(t) { localStorage.setItem('admin_token', t); }
    function clearToken() { localStorage.removeItem('admin_token'); }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'X-Admin-Token': getToken()
      };
    }

    function showView(view) {
      document.getElementById('login-view').style.display = view === 'login' ? 'flex' : 'none';
      document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'block' : 'none';
    }

    // ========== LOGIN ==========
    const loginForm = document.getElementById('login-form');
    const loginMsg = document.getElementById('login-msg');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      loginMsg.textContent = '';

      const fd = new FormData(loginForm);
      try {
        const res = await fetch(`${API_BASE_URL}/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
          body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') })
        });
        const data = await res.json();
        if (!res.ok) {
          loginMsg.textContent = data.error || 'Erro ao logar';
          btn.disabled = false;
          return;
        }
        setToken(data.token);
        showView('dashboard');
        loadCards();
      } catch {
        loginMsg.textContent = 'Erro de conexão';
        btn.disabled = false;
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearToken();
      showView('login');
    });

    // ========== TABS ==========
    document.getElementById('tabs').addEventListener('click', (e) => {
      if (!e.target.classList.contains('tab')) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      currentPage = e.target.dataset.page;
      loadCards();
    });

    // ========== CARDS ==========
    async function loadCards() {
      try {
        const res = await fetch(`${API_BASE_URL}/admin-cards?page=${encodeURIComponent(currentPage)}`, {
          headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'X-Admin-Token': getToken() }
        });
        if (res.status === 401) { clearToken(); showView('login'); return; }
        if (!res.ok) throw new Error('load failed');
        cards = await res.json();
        if (!Array.isArray(cards)) throw new Error('invalid response');
        renderCards();
      } catch {
        document.getElementById('cards-list').innerHTML = '<p style="color:#ef4444;font-size:13px">Erro ao carregar cards.</p>';
      }
    }

    function renderCards() {
      const list = document.getElementById('cards-list');
      document.getElementById('cards-count').textContent = `${cards.length} card(s)`;

      if (cards.length === 0) {
        list.innerHTML = '<p style="color:#a1a1aa;font-size:13px;text-align:center;padding:40px 0;">Nenhum card nesta página.</p>';
        return;
      }

      list.innerHTML = cards.map(c => {
        let badges = '';
        if (c.link_type === 'gated') badges += '<span class="badge badge--gated">gated</span>';
        if (c.highlight === 'orange') badges += '<span class="badge badge--orange">destaque</span>';
        if (c.status === 'active') badges += '<span class="badge badge--active">ativo</span>';
        if (c.status === 'soon') badges += '<span class="badge badge--soon">em breve</span>';
        if (c.status === 'beta') badges += '<span class="badge badge--beta">beta</span>';

        return `
          <div class="card-item ${c.visible ? '' : 'card-item--hidden'}">
            <span class="card-item__icon">${escapeHtml(c.icon) || '📄'}</span>
            <div class="card-item__info">
              <strong>${escapeHtml(c.title)}${badges}</strong>
              <small>${escapeHtml(c.description)}</small>
            </div>
            <div class="card-item__actions">
              <button class="btn btn--outline btn--sm" onclick="editCard(${parseInt(c.id)})">Editar</button>
              <button class="btn btn--danger btn--sm" onclick="deleteCard(${parseInt(c.id)})">Excluir</button>
            </div>
          </div>`;
      }).join('');
    }

    // ========== MODAL ==========
    const modal = document.getElementById('modal-overlay');
    const cardForm = document.getElementById('card-form');
    const linkTypeSelect = cardForm.querySelector('[name="link_type"]');
    const gateField = document.getElementById('field-gate-source');

    linkTypeSelect.addEventListener('change', () => {
      gateField.style.display = linkTypeSelect.value === 'gated' ? 'block' : 'none';
    });

    document.getElementById('add-card-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Novo Card';
      cardForm.reset();
      cardForm.querySelector('[name="page"]').value = currentPage;
      cardForm.querySelector('[name="visible"]').checked = true;
      gateField.style.display = 'none';
      modal.classList.add('active');
    });

    document.getElementById('modal-cancel').addEventListener('click', () => {
      modal.classList.remove('active');
    });

    window.editCard = function(id) {
      const c = cards.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modal-title').textContent = 'Editar Card';
      cardForm.querySelector('[name="id"]').value = c.id;
      cardForm.querySelector('[name="page"]').value = c.page;
      cardForm.querySelector('[name="icon"]').value = c.icon || '';
      cardForm.querySelector('[name="title"]').value = c.title;
      cardForm.querySelector('[name="description"]').value = c.description || '';
      cardForm.querySelector('[name="url"]').value = c.url || '';
      cardForm.querySelector('[name="link_type"]').value = c.link_type || 'external';
      cardForm.querySelector('[name="gate_source"]').value = c.gate_source || '';
      cardForm.querySelector('[name="status"]').value = c.status || '';
      cardForm.querySelector('[name="highlight"]').value = c.highlight || '';
      cardForm.querySelector('[name="sort_order"]').value = c.sort_order || 0;
      cardForm.querySelector('[name="visible"]').checked = c.visible;
      gateField.style.display = c.link_type === 'gated' ? 'block' : 'none';
      modal.classList.add('active');
    };

    window.deleteCard = async function(id) {
      if (!confirm('Tem certeza que deseja excluir este card?')) return;
      try {
        const res = await fetch(`${API_BASE_URL}/admin-cards`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'X-Admin-Token': getToken() },
          body: JSON.stringify({ id })
        });
        if (!res.ok) { alert('Erro ao excluir'); return; }
        loadCards();
      } catch { alert('Erro ao excluir'); }
    };

    cardForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(cardForm);
      const id = fd.get('id');
      const body = {
        page: fd.get('page'),
        icon: fd.get('icon'),
        title: fd.get('title'),
        description: fd.get('description'),
        url: fd.get('url'),
        link_type: fd.get('link_type'),
        gate_source: fd.get('gate_source') || null,
        status: fd.get('status') || null,
        highlight: fd.get('highlight') || null,
        sort_order: parseInt(fd.get('sort_order')) || 0,
        visible: cardForm.querySelector('[name="visible"]').checked
      };

      if (id) body.id = parseInt(id);

      try {
        const res = await fetch(`${API_BASE_URL}/admin-cards`, {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'X-Admin-Token': getToken() },
          body: JSON.stringify(body)
        });
        if (!res.ok) { alert('Erro ao salvar'); return; }
        modal.classList.remove('active');
        loadCards();
      } catch { alert('Erro de conexão'); }
    });

    // ========== INIT ==========
    if (getToken()) {
      showView('dashboard');
      loadCards();
    } else {
      showView('login');
    }
  </script>
</body>
</html>
